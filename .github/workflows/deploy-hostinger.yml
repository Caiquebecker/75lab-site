name: Deploy para Hostinger (FTP)

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # permite rodar manualmente pelo botão "Run workflow"

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar os arquivos do repositório
        uses: actions/checkout@v4

      - name: Enviar para a Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:   ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps          # se der erro de TLS, troque para: ftp
          port: 21
          # Pasta no servidor. Domínio principal = public_html/
          # Domínio adicional (addon) = domains/SEU-DOMINIO.com.br/public_html/
          server-dir: public_html/
          # Não enviar arquivos de bastidores para o site:
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            README.md
            LEIA-ME.txt
            *.zip
            *.ai
            brand-source/**
